<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>Whiteboard</title>
    <script>
      // Immediate theme bootstrap to prevent white flash
      // This runs synchronously before anything else renders
      (function() {
        try {
          var stored = localStorage.getItem('app-theme');
          var sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var isDark = stored === 'dark' || (!stored && sysDark);
          
          // Apply dark class immediately
          if (isDark) {
            document.documentElement.classList.add('dark');
            document.documentElement.style.backgroundColor = '#020617'; // slate-950
            document.documentElement.style.colorScheme = 'dark';
          } else {
            document.documentElement.style.backgroundColor = '#ffffff';
            document.documentElement.style.colorScheme = 'light';
          }
          
          // Also restore accent variables if present
          var accentBg = localStorage.getItem('app-accent-bg');
          var accentRoot = localStorage.getItem('app-accent-root');
          var accentActive = localStorage.getItem('app-accent-active');
          if (accentBg) document.documentElement.style.setProperty('--app-accent-bg', accentBg);
          if (accentRoot) document.documentElement.style.setProperty('--app-accent-root', accentRoot);
          if (accentActive) document.documentElement.style.setProperty('--app-accent-active', accentActive);
        } catch(e) {}
      })();
    </script>
    <style>
      /* Critical CSS to prevent flash - applied before external CSS loads */
      html.dark { background-color: #020617; color: #f1f5f9; }
      html:not(.dark) { background-color: #ffffff; color: #0f172a; }
    </style>
  </head>
  <body class="m-0 bg-ui-bg text-ui-text font-sans dark:bg-slate-950 dark:text-slate-100">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
