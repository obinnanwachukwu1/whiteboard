<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline';
      style-src 'self' 'unsafe-inline';
      img-src 'self' data: canvas-file: https: blob:;
      media-src 'self' canvas-file: https: blob:;
      font-src 'self' data:;
      connect-src 'self' canvas-file: https:;
	      frame-src 'self' https: pdf-viewer: docx-viewer:;
	    ">
    <title>Whiteboard</title>
    <script>
      // Immediate theme bootstrap to prevent white flash
      // This runs synchronously before anything else renders
      (function() {
        try {
          // New: versioned cache written by applyThemeTokens().
          var cacheRaw = localStorage.getItem('wb-theme-cache-v1');
          if (cacheRaw) {
            var cache = JSON.parse(cacheRaw);
            if (cache && cache.v === 1 && (cache.theme === 'light' || cache.theme === 'dark')) {
              var root = document.documentElement;
              if (cache.theme === 'dark') {
                root.classList.add('dark');
                root.style.backgroundColor = '#020617'; // slate-950 fallback
                root.style.colorScheme = 'dark';
              } else {
                root.style.backgroundColor = '#ffffff';
                root.style.colorScheme = 'light';
              }

              var tokens = cache.tokens || {};
              for (var k in tokens) {
                if (Object.prototype.hasOwnProperty.call(tokens, k) && typeof k === 'string' && k.indexOf('--') === 0) {
                  root.style.setProperty(k, String(tokens[k]));
                }
              }

              var ds = cache.dataset || null;
              if (ds) {
                if (ds.backgroundMode) root.dataset.backgroundMode = ds.backgroundMode;
                if (ds.backgroundType) root.dataset.backgroundType = ds.backgroundType;
                if (ds.patternId) root.dataset.patternId = ds.patternId;
              }
              return;
            }
          }

          // Fallback: just dark/light (legacy app-theme or system).
          var stored = localStorage.getItem('app-theme');
          var sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var isDark = stored === 'dark' || (!stored && sysDark);

          if (isDark) {
            document.documentElement.classList.add('dark');
            document.documentElement.style.backgroundColor = '#020617';
            document.documentElement.style.colorScheme = 'dark';
          } else {
            document.documentElement.style.backgroundColor = '#ffffff';
            document.documentElement.style.colorScheme = 'light';
          }
        } catch(e) {}
      })();
    </script>
    <style>
      /* Critical CSS to prevent flash - applied before external CSS loads */
      html.dark { background-color: #020617; color: #f1f5f9; }
      html:not(.dark) { background-color: #ffffff; color: #0f172a; }
    </style>
  </head>
  <body class="m-0 bg-ui-bg text-ui-text font-sans dark:bg-slate-950 dark:text-slate-100">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
